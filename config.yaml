project:
  name: yeniBot
  package: yenibot
  phase: 1
  random_seed: 42
  deterministic: true

paths:
  drive_base: /content/drive/MyDrive/yeniBot
  data_dir: /content/drive/MyDrive/yeniBot/data
  checkpoint_dir: /content/drive/MyDrive/yeniBot/checkpoints
  local_data_dir: data
  local_checkpoint_dir: checkpoints

binance:
  base_url: https://fapi.binance.com
  vision_base_url: https://s3-ap-northeast-1.amazonaws.com/data.binance.vision
  data_source: auto
  symbol: BTCUSDT
  primary_interval: 1h
  htf_interval: 4h
  start_date: "2022-01-01"
  end_date: null
  limit: 1500
  request_sleep_seconds: 0.15
  max_gap_multiplier: 2
  zero_volume_policy: drop

features:
  active_profile: baseline_no_4h_tier1_4h_large_trade_pressure_long
  exclude_columns: []
  exclude_patterns: []
  profiles:
    all:
      description: Use every feature that survives leakage and stationarity filters.
      include_patterns: ["*"]
      exclude_patterns: []
    baseline_40:
      description: Original stationarity-safe Tier 1-3 feature set without order-flow v2.
      include_patterns:
        - "*taker_buy_ratio"
        - "*taker_sell_ratio"
        - "*true_cvd_zscore"
        - "*true_cvd_delta_norm"
        - "*cvd_cumulative_rate_norm"
        - "*buy_sell_imbalance_ema"
        - "*volume_log_zscore"
        - "*volume_denoised_log_zscore"
        - "*close_denoised_log_return"
        - "*log_return"
        - "*realized_vol_14"
        - "*gk_vol_14"
        - "*atr_14_pct"
        - "*adx_14"
        - "*vwap_dist_atr"
        - "*vpt_zscore"
        - "*vol_per_trade_log_zscore"
        - "*whale_buy_flag"
        - "*whale_sell_flag"
        - "*large_trade_ratio"
      exclude_patterns:
        - "*taker_imbalance*"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_bounded_v2:
      description: Baseline plus bounded taker-imbalance v2 features on 1H and 4H.
      inherit: baseline_40
      include_patterns:
        - "*taker_imbalance"
        - "*taker_buy_ratio_zscore"
        - "*taker_buy_ratio_delta"
        - "*taker_imbalance_slope"
        - "*taker_imbalance_mean_*"
      exclude_patterns:
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale:
      description: Conservative next run; baseline plus only 4H bounded order-flow v2 and whale context.
      inherit: baseline_40
      include_patterns:
        - "4h_taker_imbalance"
        - "4h_taker_buy_ratio_zscore"
        - "4h_taker_buy_ratio_delta"
        - "4h_taker_imbalance_slope"
        - "4h_taker_imbalance_mean_*"
        - "4h_vpt_zscore"
        - "4h_vol_per_trade_log_zscore"
        - "4h_whale_buy_flag"
        - "4h_whale_sell_flag"
        - "4h_large_trade_ratio"
      exclude_patterns:
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1:
      description: Keep the bounded 4H v2 and whale context, but remove the harmful inherited 4H Tier 1 family.
      inherit: baseline_plus_4h_bounded_whale
      include_patterns: []
      exclude_patterns:
        - "4h_taker_buy_ratio"
        - "4h_taker_sell_ratio"
        - "4h_true_cvd_zscore"
        - "4h_true_cvd_delta_norm"
        - "4h_cvd_cumulative_rate_norm"
        - "4h_buy_sell_imbalance_ema"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale_stable_structure:
      description: Long-horizon profile; use stable volatility/structure ranks/zscores instead of raw vol/structure levels.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      include_patterns:
        - "*log_return_stable_zscore"
        - "*log_return_stable_rank"
