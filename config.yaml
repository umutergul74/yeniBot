      exclude_patterns: []
  warmup_rows: 300
  stationarity:
    enabled: true
    normalization_window: 100
    exclude_nonstationary: true
    exclude_patterns:
      - "*close_denoised"
      - "*volume_denoised"
      - "*true_cvd_delta"
      - "*cvd_cumulative_rate"
      - "*vol_per_trade"
      - "*atr_14"
  wavelet:
    enabled: true
    window: 256
    wavelet: db4
    level: 2
    threshold_scale: 0.5
  order_flow:
    cvd_zscore_window: 100
    cvd_rate_window: 100
    imbalance_ema_span: 14
  order_flow_v2:
    enabled: true
    ratio_zscore_window: 100
    ratio_delta_periods: 1
    imbalance_slope_window: 24
    pressure_windows: [3, 6, 12, 24]
    pressure_spread_pairs:
      - [24, 12]
    efficiency_epsilon: 0.001
    stable_only: true
    stable_window: 100
    stable_clip_abs: 5.0
    stable_tanh_scale: 2.0
    stable_transforms: [zscore, rank, tanh]
  order_flow_volatility_interactions:
    enabled: true
    flow_columns:
      - taker_imbalance
      - taker_imbalance_slope
      - signed_large_trade_pressure_stable_rank
      - large_trade_pressure_12_stable_rank
      - large_trade_pressure_24_stable_rank
    volatility_columns:
      - realized_vol_14_stable_rank
      - gk_vol_14_stable_rank
      - atr_14_pct_stable_rank
    modes: [signed, high, low]
  intrahour_order_flow:
    enabled: true
    interval: 15m
    prefix: ih15
    expected_bars_per_hour: 4
    min_bars_per_hour: 4
    stable_window: 100
    stable_clip_abs: 5.0
    stable_tanh_scale: 2.0
    stable_transforms: [zscore, rank]
    stable_columns:
      - ih15_cvd_pressure_norm
      - ih15_cvd_pressure_late_minus_early_norm
      - ih15_cvd_slope_norm
      - ih15_vpt_last_vs_hour
      - ih15_vpt_late_vs_early
      - ih15_large_trade_concentration
      - ih15_aggressive_buy_burst
      - ih15_aggressive_sell_burst
  structure_stability:
    enabled: true
    stable_window: 100
    stable_clip_abs: 5.0
    stable_transforms: [zscore, rank]
    source_columns:
      - log_return
      - close_denoised_log_return
      - realized_vol_14
      - gk_vol_14
      - atr_14_pct
      - adx_14
      - vwap_dist_atr
      - volume_log_zscore
      - volume_denoised_log_zscore
  whale:
    vpt_zscore_window: 100
    whale_zscore_threshold: 2.0
    whale_buy_ratio: 0.55
    whale_sell_ratio: 0.45
    large_trade_window: 100
  structure:
    realized_vol_window: 14
    gk_vol_window: 14
    atr_period: 14
    adx_period: 14
    vwap_window: 24
  mtf:
    shift_hours: 4

labeling:
  tp_multiplier: 2.0
  sl_multiplier: 5.0
  max_holding_bars: 10
  atr_column: atr_14
  min_long_forward_return: 0.003
  max_not_long_forward_return: 0.001
  min_long_pct: 0.20
  max_long_pct: 0.50

model:
  seq_len: 64
  tcn_channels: 64
  tcn_kernel_size: 3
  tcn_dilations: [1, 2, 4, 8, 16]
  gru_hidden: 128
  gru_layers: 2
  dropout: 0.2
  fusion_hidden: 128

training:
  batch_size: 256
  epochs: 100
  early_stop_patience: 15
  optimizer:
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    T_0: 10
    T_mult: 2
  grad_clip: 1.0
  loss:
    focal_gamma: 2.0
    focal_alpha: 0.6
    rank_ic_weight: 0.2

walk_forward:
  train_bars: 5040
  val_bars: 1080
  test_bars: 720
  step_bars: 720
  purge_bars: 24
  embargo_bars: 6

hmm:
  n_states: 3
  covariance_type: full
  n_iter: 200
  random_state: 42
  gamma_floor: 0.02
  state_weight_floor: 0.08
  n_ratio_alarm: 15.0
  suppress_convergence_warnings: true
  features:
    - log_return
    - gk_vol_14
    - adx_14
    - true_cvd_zscore
    - vwap_dist_atr

validation:
  target_rank_ic: 0.03
  max_rank_ic_std: 0.03
  min_positive_ic_fraction: 0.75
  min_long_f1: 0.45
  suspicious_rank_ic: 0.10
  random_like_rank_ic: 0.01
  bad_fold_ic_threshold: -0.08
  calibration_bins: 10
  calibration:
    enabled: true
    method: isotonic
  threshold_checks:
    max_pred_long_rate: 0.70
    min_precision: 0.30
  score_lift_bins: 10
  score_bands:
    - {name: top_10, min_bin: 9, max_bin: 9}
    - {name: top_20, min_bin: 8, max_bin: 9}
    - {name: top_30, min_bin: 7, max_bin: 9}
    - {name: upper_half, min_bin: 5, max_bin: 9}
    - {name: mid_upper_40_90, min_bin: 4, max_bin: 8}
  recent_folds: 5
  permutation_importance_folds: 7
  permutation_repeats: 1

experiments:
  mode: staged
  run_id: null
  control_profile: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
  candidate_profiles:
    - baseline_stable_plus_15m_late_order_flow
    - baseline_stable_plus_15m_intrahour_pressure
    - baseline_stable_plus_15m_whale_burst
    - baseline_stable_plus_15m_order_flow_full
  triage_fold_ids: [0, 2, 4, 8, 13, 16, 17, 20, 21, 22, 23, 29, 32, 35, 36, 38, 39, 40, 41]
  full_cv_profiles: auto
  always_full_profiles:
    - baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
    - baseline_plus_4h_bounded_whale_no_4h_tier1
    - baseline_no_4h_tier1_4h_large_trade_pressure_long
    - baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility
  max_auto_full_candidates: 2
  resume_existing: true
  force_retrain: false
  experiment_memory:
    enabled: true
    reject_retests: true
    allow_retest_profiles: []
    reference_notes:
      baseline_plus_4h_bounded_whale_no_4h_tier1: "Legacy baseline kept for continuity; latest full run mean IC 0.0575, std 0.1012, positive folds 78.6%."
      baseline_no_4h_tier1_4h_large_trade_pressure_long: "Tail-lift benchmark; latest full run mean IC 0.0517, std 0.0938, top-10 lift 1.1681 but only 61.9% positive folds."
      baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility: "Best current single-profile stability branch; latest full run mean IC 0.0596, std 0.0738, positive folds 85.7%."
    rejected_profiles:
      baseline_plus_4h_bounded_whale_stable_structure:
        reason: "Full stable-structure replacement reduced mean IC and increased instability versus the prior control."
      baseline_plus_4h_bounded_whale_no_4h_tier1_plus_4h_stable_overlay:
        reason: "Narrow stable overlay did not beat the control gates when raw pure volatility remained in place."
      baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_slow_4h_bounded_flow:
        reason: "Latest triage showed weaker IC; removing slow bounded flow did not fix the remaining bad folds."
      baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_4h_bounded_flow:
        reason: "Latest triage showed weaker IC; deleting the full 4H bounded-flow family removed useful context."
      baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_4h_volume_context:
        reason: "Latest triage had unstable positive-fold coverage; 4H volume deletion alone was not the right stabilizer."
      baseline_no_4h_tier1_4h_cvd_pressure_stable:
        reason: "Earlier flow-stable candidate failed promotion gates; stable CVD pressure alone did not improve the control."
      baseline_no_4h_tier1_flow_stable_combo:
        reason: "Earlier CVD plus large-trade stable combo over-expanded flow overlays and failed promotion gates."
      baseline_no_4h_tier1_pruned_whale:
        reason: "Earlier pruned-whale run did not add predictive edge over the control."
      baseline_no_4h_tier1_4h_large_trade_pressure_rank_only:
        reason: "Rank-only pressure branch did not beat the long-pressure benchmark."
      baseline_no_4h_tier1_4h_large_trade_pressure_zscore_only:
        reason: "Z-score-only pressure branch did not beat the long-pressure benchmark."
      baseline_no_4h_tier1_4h_large_trade_pressure_short:
        reason: "Short-horizon pressure branch was less stable than the long-horizon pressure branch."
      baseline_no_4h_tier1_4h_large_trade_pressure_long_no_4h_bounded_flow:
        reason: "Latest run showed no improvement; removing 4H bounded-flow context hurt the pressure branch."
      baseline_no_4h_tier1_4h_large_trade_pressure_long_bad_fold_guardrail_light:
        reason: "Guardrail profile was too destructive and did not recover the bad-fold pattern."
      baseline_no_4h_tier1_4h_large_trade_pressure_long_no_4h_1h_pure_volatility:
        reason: "Bundle 20260510_124744 triage had top-10 lift below 1.0 and negative recent IC."
      baseline_no_4h_tier1_4h_large_trade_pressure_long_no_4h_1h_pure_volatility_pressure_24_only:
        reason: "Bundle 20260510_124744 triage had weak mean IC and unstable positive-fold coverage."
      baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_1h_pure_volatility_plus_4h_stable_vol_overlay:
        reason: "Bundle 20260510_124744 triage improved volatility stability but damaged top-10 lift below 1.0."
      baseline_plus_4h_bounded_whale_no_4h_tier1_no_raw_pure_volatility_except_1h_atr:
        reason: "Bundle 20260510_145746 raw-volatility re-add failed to beat the stability control; volatility should be context, not standalone signal."
      baseline_plus_4h_bounded_whale_no_4h_tier1_no_raw_pure_volatility_except_1h_gk:
        reason: "Bundle 20260510_145746 raw-volatility re-add failed to beat the stability control; top-10 lift fell below the control."
      baseline_plus_4h_bounded_whale_no_4h_tier1_no_raw_pure_volatility_except_1h_realized:
