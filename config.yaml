project:
  name: yeniBot
  package: yenibot
  phase: 1
  random_seed: 42
  deterministic: true

paths:
  drive_base: /content/drive/MyDrive/yeniBot
  data_dir: /content/drive/MyDrive/yeniBot/data
  checkpoint_dir: /content/drive/MyDrive/yeniBot/checkpoints
  local_data_dir: data
  local_checkpoint_dir: checkpoints

binance:
  base_url: https://fapi.binance.com
  vision_base_url: https://s3-ap-northeast-1.amazonaws.com/data.binance.vision
  data_source: auto
  symbol: BTCUSDT
  primary_interval: 1h
  htf_interval: 4h
  intrabar_intervals: [15m]
  start_date: "2022-01-01"
  end_date: null
  limit: 1500
  request_sleep_seconds: 0.15
  max_gap_multiplier: 2
  zero_volume_policy: drop

features:
  active_profile: baseline_plus_4h_bounded_whale_no_4h_tier1
  exclude_columns: []
  exclude_patterns: []
  profiles:
    all:
      description: Use every feature that survives leakage and stationarity filters.
      include_patterns: ["*"]
      exclude_patterns: []
    baseline_40:
      description: Original stationarity-safe Tier 1-3 feature set without order-flow v2.
      include_patterns:
        - "*taker_buy_ratio"
        - "*taker_sell_ratio"
        - "*true_cvd_zscore"
        - "*true_cvd_delta_norm"
        - "*cvd_cumulative_rate_norm"
        - "*buy_sell_imbalance_ema"
        - "*volume_log_zscore"
        - "*volume_denoised_log_zscore"
        - "*close_denoised_log_return"
        - "*log_return"
        - "*realized_vol_14"
        - "*gk_vol_14"
        - "*atr_14_pct"
        - "*adx_14"
        - "*vwap_dist_atr"
        - "*vpt_zscore"
        - "*vol_per_trade_log_zscore"
        - "*whale_buy_flag"
        - "*whale_sell_flag"
        - "*large_trade_ratio"
      exclude_patterns:
        - "*taker_imbalance*"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_bounded_v2:
      description: Baseline plus bounded taker-imbalance v2 features on 1H and 4H.
      inherit: baseline_40
      include_patterns:
        - "*taker_imbalance"
        - "*taker_buy_ratio_zscore"
        - "*taker_buy_ratio_delta"
        - "*taker_imbalance_slope"
        - "*taker_imbalance_mean_*"
      exclude_patterns:
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale:
      description: Conservative next run; baseline plus only 4H bounded order-flow v2 and whale context.
      inherit: baseline_40
      include_patterns:
        - "4h_taker_imbalance"
        - "4h_taker_buy_ratio_zscore"
        - "4h_taker_buy_ratio_delta"
        - "4h_taker_imbalance_slope"
        - "4h_taker_imbalance_mean_*"
        - "4h_vpt_zscore"
        - "4h_vol_per_trade_log_zscore"
        - "4h_whale_buy_flag"
        - "4h_whale_sell_flag"
        - "4h_large_trade_ratio"
      exclude_patterns:
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1:
      description: Keep the bounded 4H v2 and whale context, but remove the harmful inherited 4H Tier 1 family.
      inherit: baseline_plus_4h_bounded_whale
      include_patterns: []
      exclude_patterns:
        - "4h_taker_buy_ratio"
        - "4h_taker_sell_ratio"
        - "4h_true_cvd_zscore"
        - "4h_true_cvd_delta_norm"
        - "4h_cvd_cumulative_rate_norm"
        - "4h_buy_sell_imbalance_ema"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "cvd_pressure*"
        - "4h_cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_slow_4h_bounded_flow:
      description: Baseline control without slower 12/24-bar 4H taker-imbalance means; tests bad-fold bounded-flow drift.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_taker_imbalance_mean_12"
        - "4h_taker_imbalance_mean_24"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_bounded_flow:
      description: Baseline control without all 4H bounded taker-flow context; isolates whale/structure backbone quality.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_taker_imbalance"
        - "4h_taker_buy_ratio_zscore"
        - "4h_taker_buy_ratio_delta"
        - "4h_taker_imbalance_slope"
        - "4h_taker_imbalance_mean_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_large_trade_ratio:
      description: Baseline control with only raw 4H large-trade ratio removed after repeated bad-fold shifts.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_large_trade_ratio"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_whale_zscores:
      description: Baseline control removing smoother 4H VPT and volume-per-trade z-scores while keeping sparse whale flags.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_vpt_zscore"
        - "4h_vol_per_trade_log_zscore"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility:
      description: Baseline control removing raw 4H volatility magnitude levels while keeping directional and VWAP context.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_realized_vol_14"
        - "4h_gk_vol_14"
        - "4h_atr_14_pct"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_slow_4h_bounded_flow:
      description: Stability candidate removing raw 4H pure volatility plus slow 12/24-bar 4H bounded flow.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility
      append_exclude_patterns:
        - "4h_taker_imbalance_mean_12"
        - "4h_taker_imbalance_mean_24"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_4h_bounded_flow:
      description: Stability candidate removing raw 4H pure volatility plus all 4H bounded taker-flow context.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility
      append_exclude_patterns:
        - "4h_taker_imbalance"
        - "4h_taker_buy_ratio_zscore"
        - "4h_taker_buy_ratio_delta"
        - "4h_taker_imbalance_slope"
        - "4h_taker_imbalance_mean_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility:
      description: Stability candidate removing raw 4H pure volatility and local 1H volatility magnitude levels.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility
      append_exclude_patterns:
        - "realized_vol_14"
        - "gk_vol_14"
        - "atr_14_pct"
    baseline_stable_allow_intrahour_stable:
      description: Stability control with explicit exclusions that keep existing stable families out while allowing ih15 stable intrahour features.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
      exclude_patterns:
        - "4h_taker_buy_ratio"
        - "4h_taker_sell_ratio"
        - "4h_true_cvd_zscore"
        - "4h_true_cvd_delta_norm"
        - "4h_cvd_cumulative_rate_norm"
        - "4h_buy_sell_imbalance_ema"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "cvd_pressure*"
        - "4h_cvd_pressure*"
        - "*large_trade_pressure*"
        - "log_return_stable_*"
        - "close_denoised_log_return_stable_*"
        - "realized_vol_14_stable_*"
        - "gk_vol_14_stable_*"
        - "atr_14_pct_stable_*"
        - "adx_14_stable_*"
        - "vwap_dist_atr_stable_*"
        - "volume_log_zscore_stable_*"
        - "volume_denoised_log_zscore_stable_*"
        - "4h_log_return_stable_*"
        - "4h_close_denoised_log_return_stable_*"
        - "4h_realized_vol_14_stable_*"
        - "4h_gk_vol_14_stable_*"
        - "4h_atr_14_pct_stable_*"
        - "4h_adx_14_stable_*"
        - "4h_vwap_dist_atr_stable_*"
        - "4h_volume_log_zscore_stable_*"
        - "4h_volume_denoised_log_zscore_stable_*"
        - "4h_realized_vol_14"
        - "4h_gk_vol_14"
        - "4h_atr_14_pct"
        - "realized_vol_14"
        - "gk_vol_14"
        - "atr_14_pct"
    baseline_stable_no_1h_cvd_rate:
      description: Stability control without the local CVD cumulative-rate feature that repeatedly reverses in bad folds.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
      append_exclude_patterns:
        - "cvd_cumulative_rate_norm"
    baseline_stable_no_slow_4h_bounded_flow:
      description: Stability control without slow 12/24-bar aligned 4H taker-imbalance means, keeping faster bounded flow context.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
      append_exclude_patterns:
        - "4h_taker_imbalance_mean_12"
        - "4h_taker_imbalance_mean_24"
    baseline_stable_no_slow_4h_bounded_flow_no_1h_cvd_rate:
      description: "Stability control with the two most plausible bad-fold stabilizers combined: no slow 4H flow means and no local CVD rate."
      inherit: baseline_stable_no_slow_4h_bounded_flow
      append_exclude_patterns:
        - "cvd_cumulative_rate_norm"
    baseline_stable_no_4h_whale_zscores:
      description: Stability control without smoother 4H whale z-score magnitudes, retaining sparse whale flags and large-trade ratio.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
      append_exclude_patterns:
        - "4h_vpt_zscore"
        - "4h_vol_per_trade_log_zscore"
    baseline_stable_no_4h_volume_context:
      description: Stability control without aligned 4H volume context; tests whether 4H volume level features are adding regime noise.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
      append_exclude_patterns:
        - "4h_volume_log_zscore"
        - "4h_volume_denoised_log_zscore"
    baseline_stable_no_1h_large_trade_ratio:
      description: Stability control without local large-trade-ratio smoothing, isolating whether sparse whale flags carry the cleaner signal.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
      append_exclude_patterns:
        - "large_trade_ratio"
    baseline_stable_plus_15m_late_order_flow:
      description: Stability control plus only late-hour 15m taker-flow shape features.
      inherit: baseline_stable_allow_intrahour_stable
      include_patterns:
        - "ih15_coverage"
        - "ih15_taker_imbalance_last"
        - "ih15_taker_imbalance_late_minus_early"
        - "ih15_taker_imbalance_slope"
        - "ih15_buy_ratio_range"
        - "ih15_volume_share_last"
        - "ih15_aggressive_buy_burst"
        - "ih15_aggressive_sell_burst"
        - "ih15_aggressive_buy_burst_stable_rank"
        - "ih15_aggressive_sell_burst_stable_rank"
    baseline_stable_plus_15m_intrahour_pressure:
      description: Stability control plus 15m intrahour CVD pressure and normalized pressure-shape features.
      inherit: baseline_stable_allow_intrahour_stable
      include_patterns:
        - "ih15_cvd_pressure_norm"
        - "ih15_cvd_pressure_late_minus_early_norm"
        - "ih15_cvd_slope_norm"
        - "ih15_cvd_pressure_norm_stable_rank"
        - "ih15_cvd_pressure_norm_stable_zscore"
        - "ih15_cvd_slope_norm_stable_rank"
        - "ih15_cvd_slope_norm_stable_zscore"
        - "ih15_taker_imbalance_late_minus_early"
        - "ih15_taker_imbalance_slope"
    baseline_stable_plus_15m_whale_burst:
      description: Stability control plus 15m ticket-size burst and last-quarter aggressive flow concentration.
      inherit: baseline_stable_allow_intrahour_stable
      include_patterns:
        - "ih15_volume_share_last"
        - "ih15_trade_share_last"
        - "ih15_vpt_last_vs_hour"
        - "ih15_vpt_late_vs_early"
        - "ih15_large_trade_concentration"
        - "ih15_buy_volume_share_last"
        - "ih15_vpt_last_vs_hour_stable_rank"
        - "ih15_vpt_last_vs_hour_stable_zscore"
        - "ih15_large_trade_concentration_stable_rank"
        - "ih15_large_trade_concentration_stable_zscore"
        - "ih15_aggressive_buy_burst"
        - "ih15_aggressive_sell_burst"
    baseline_stable_plus_15m_order_flow_full:
      description: Stability control plus the full bounded 15m intrahour order-flow shape family.
      inherit: baseline_stable_allow_intrahour_stable
      include_patterns:
        - "ih15_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_raw_pure_volatility_except_1h_atr:
      description: "Minimum volatility re-add: stability branch plus only local 1H ATR percent."
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_realized_vol_14"
        - "4h_gk_vol_14"
        - "4h_atr_14_pct"
        - "realized_vol_14"
        - "gk_vol_14"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_raw_pure_volatility_except_1h_gk:
      description: "Minimum volatility re-add: stability branch plus only local 1H Garman-Klass volatility."
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_realized_vol_14"
        - "4h_gk_vol_14"
        - "4h_atr_14_pct"
        - "realized_vol_14"
        - "atr_14_pct"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_raw_pure_volatility_except_1h_realized:
      description: "Minimum volatility re-add: stability branch plus only local 1H realized volatility."
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_realized_vol_14"
        - "4h_gk_vol_14"
        - "4h_atr_14_pct"
        - "gk_vol_14"
        - "atr_14_pct"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_raw_pure_volatility_except_4h_atr:
      description: "Minimum volatility re-add: stability branch plus only aligned 4H ATR percent."
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_realized_vol_14"
        - "4h_gk_vol_14"
        - "realized_vol_14"
        - "gk_vol_14"
        - "atr_14_pct"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_raw_pure_volatility_except_4h_gk:
      description: "Minimum volatility re-add: stability branch plus only aligned 4H Garman-Klass volatility."
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_realized_vol_14"
        - "4h_atr_14_pct"
        - "realized_vol_14"
        - "gk_vol_14"
        - "atr_14_pct"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_raw_pure_volatility_except_4h_realized:
      description: "Minimum volatility re-add: stability branch plus only aligned 4H realized volatility."
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_gk_vol_14"
        - "4h_atr_14_pct"
        - "realized_vol_14"
        - "gk_vol_14"
        - "atr_14_pct"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_1h_pure_volatility_plus_4h_stable_vol_overlay:
      description: Latest stability branch with raw 1H/4H pure volatility removed, then only narrow 4H stable volatility/structure overlay added back.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_plus_4h_stable_overlay
      append_exclude_patterns:
        - "4h_realized_vol_14"
        - "4h_gk_vol_14"
        - "4h_atr_14_pct"
        - "realized_vol_14"
        - "gk_vol_14"
        - "atr_14_pct"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_4h_volume_context:
      description: Stability candidate removing raw 4H pure volatility and 4H volume-scale context flagged in bad folds.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility
      append_exclude_patterns:
        - "4h_volume_log_zscore"
        - "4h_volume_denoised_log_zscore"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_1h_cvd_rate:
      description: Baseline control removing 1H cumulative CVD rate to test repeated tier-1 reversal risk.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "cvd_cumulative_rate_norm"
    baseline_plus_4h_bounded_whale_no_4h_tier1_bad_fold_guardrail_light:
      description: Baseline guardrail removing slow 4H bounded flow, raw 4H large-trade ratio, raw 4H pure volatility, and 1H CVD rate.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_slow_4h_bounded_flow
      append_exclude_patterns:
        - "4h_large_trade_ratio"
        - "4h_realized_vol_14"
        - "4h_gk_vol_14"
        - "4h_atr_14_pct"
        - "cvd_cumulative_rate_norm"
    baseline_plus_4h_bounded_whale_stable_structure:
      description: Long-horizon profile; use stable volatility/structure ranks/zscores instead of raw vol/structure levels.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      include_patterns:
        - "*log_return_stable_zscore"
        - "*log_return_stable_rank"
        - "*realized_vol_14_stable_zscore"
        - "*realized_vol_14_stable_rank"
        - "*gk_vol_14_stable_zscore"
        - "*gk_vol_14_stable_rank"
        - "*atr_14_pct_stable_zscore"
        - "*atr_14_pct_stable_rank"
        - "*adx_14_stable_zscore"
        - "*adx_14_stable_rank"
        - "*vwap_dist_atr_stable_zscore"
        - "*vwap_dist_atr_stable_rank"
        - "*volume_log_zscore_stable_zscore"
        - "*volume_log_zscore_stable_rank"
        - "*volume_denoised_log_zscore_stable_zscore"
        - "*volume_denoised_log_zscore_stable_rank"
      exclude_patterns:
        - "4h_taker_buy_ratio"
        - "4h_taker_sell_ratio"
        - "4h_true_cvd_zscore"
        - "4h_true_cvd_delta_norm"
        - "4h_cvd_cumulative_rate_norm"
        - "4h_buy_sell_imbalance_ema"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*log_return"
        - "*realized_vol_14"
        - "*gk_vol_14"
        - "*atr_14_pct"
        - "*adx_14"
        - "*vwap_dist_atr"
        - "*volume_log_zscore"
        - "*volume_denoised_log_zscore"
    baseline_plus_4h_bounded_whale_no_4h_tier1_plus_4h_stable_overlay:
      description: Keep the stronger raw baseline structure backbone and add only a narrow 4H stable-structure overlay.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      include_patterns:
        - "4h_realized_vol_14_stable_zscore"
        - "4h_realized_vol_14_stable_rank"
        - "4h_gk_vol_14_stable_zscore"
        - "4h_gk_vol_14_stable_rank"
        - "4h_atr_14_pct_stable_zscore"
        - "4h_atr_14_pct_stable_rank"
        - "4h_adx_14_stable_zscore"
        - "4h_adx_14_stable_rank"
        - "4h_vwap_dist_atr_stable_zscore"
        - "4h_vwap_dist_atr_stable_rank"
      exclude_patterns:
        - "4h_taker_buy_ratio"
        - "4h_taker_sell_ratio"
        - "4h_true_cvd_zscore"
        - "4h_true_cvd_delta_norm"
        - "4h_cvd_cumulative_rate_norm"
        - "4h_buy_sell_imbalance_ema"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "log_return_stable_*"
        - "close_denoised_log_return_stable_*"
        - "realized_vol_14_stable_*"
        - "gk_vol_14_stable_*"
        - "atr_14_pct_stable_*"
        - "adx_14_stable_*"
        - "vwap_dist_atr_stable_*"
        - "volume_log_zscore_stable_*"
        - "volume_denoised_log_zscore_stable_*"
        - "4h_log_return_stable_*"
        - "4h_close_denoised_log_return_stable_*"
        - "4h_volume_log_zscore_stable_*"
        - "4h_volume_denoised_log_zscore_stable_*"
    baseline_no_4h_tier1_pruned_whale:
      description: Baseline control with noisy 4H large-trade ratio removed while keeping bounded 4H whale context.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      include_patterns: []
      exclude_patterns:
        - "4h_taker_buy_ratio"
        - "4h_taker_sell_ratio"
        - "4h_true_cvd_zscore"
        - "4h_true_cvd_delta_norm"
        - "4h_cvd_cumulative_rate_norm"
        - "4h_buy_sell_imbalance_ema"
        - "4h_large_trade_ratio"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_no_4h_tier1_4h_cvd_pressure_stable:
      description: Baseline control plus stable 4H CVD pressure windows only.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      include_patterns:
        - "4h_cvd_pressure_3_stable_zscore"
