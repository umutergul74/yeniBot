  warmup_rows: 300
  stationarity:
    enabled: true
    normalization_window: 100
    exclude_nonstationary: true
    exclude_patterns:
      - "*close_denoised"
      - "*volume_denoised"
      - "*true_cvd_delta"
      - "*cvd_cumulative_rate"
      - "*vol_per_trade"
      - "*atr_14"
  wavelet:
    enabled: true
    window: 256
    wavelet: db4
    level: 2
    threshold_scale: 0.5
  order_flow:
    cvd_zscore_window: 100
    cvd_rate_window: 100
    imbalance_ema_span: 14
  order_flow_v2:
    enabled: true
    ratio_zscore_window: 100
    ratio_delta_periods: 1
    imbalance_slope_window: 24
    pressure_windows: [3, 6, 12, 24]
    efficiency_epsilon: 0.001
    stable_only: true
    stable_window: 100
    stable_clip_abs: 5.0
    stable_transforms: [zscore, rank]
  structure_stability:
    enabled: true
    stable_window: 100
    stable_clip_abs: 5.0
    stable_transforms: [zscore, rank]
    source_columns:
      - log_return
      - close_denoised_log_return
      - realized_vol_14
      - gk_vol_14
      - atr_14_pct
      - adx_14
      - vwap_dist_atr
      - volume_log_zscore
      - volume_denoised_log_zscore
  whale:
    vpt_zscore_window: 100
    whale_zscore_threshold: 2.0
    whale_buy_ratio: 0.55
    whale_sell_ratio: 0.45
    large_trade_window: 100
  structure:
    realized_vol_window: 14
    gk_vol_window: 14
    atr_period: 14
    adx_period: 14
    vwap_window: 24
  mtf:
    shift_hours: 4

labeling:
  tp_multiplier: 2.0
  sl_multiplier: 5.0
  max_holding_bars: 10
  atr_column: atr_14
  min_long_forward_return: 0.003
  max_not_long_forward_return: 0.001
  min_long_pct: 0.20
  max_long_pct: 0.50

model:
  seq_len: 64
  tcn_channels: 64
  tcn_kernel_size: 3
  tcn_dilations: [1, 2, 4, 8, 16]
  gru_hidden: 128
  gru_layers: 2
  dropout: 0.2
  fusion_hidden: 128

training:
  batch_size: 256
  epochs: 100
  early_stop_patience: 15
  optimizer:
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    T_0: 10
    T_mult: 2
  grad_clip: 1.0
  loss:
    focal_gamma: 2.0
    focal_alpha: 0.6
    rank_ic_weight: 0.2

walk_forward:
  train_bars: 5040
  val_bars: 1080
  test_bars: 720
  step_bars: 720
  purge_bars: 24
  embargo_bars: 6

hmm:
  n_states: 3
  covariance_type: full
  n_iter: 200
  random_state: 42
  gamma_floor: 0.02
  state_weight_floor: 0.08
  n_ratio_alarm: 15.0
  features:
    - log_return
    - gk_vol_14
    - adx_14
    - true_cvd_zscore
    - vwap_dist_atr

validation:
  target_rank_ic: 0.03
  max_rank_ic_std: 0.03
  min_positive_ic_fraction: 0.75
  min_long_f1: 0.45
  suspicious_rank_ic: 0.10
  random_like_rank_ic: 0.01
  calibration_bins: 10
  score_lift_bins: 10
  score_bands:
    - {name: top_10, min_bin: 9, max_bin: 9}
    - {name: top_20, min_bin: 8, max_bin: 9}
    - {name: top_30, min_bin: 7, max_bin: 9}
    - {name: upper_half, min_bin: 5, max_bin: 9}
    - {name: mid_upper_40_90, min_bin: 4, max_bin: 8}
  recent_folds: 5
  permutation_importance_folds: 7
  permutation_repeats: 1

experiments:
  mode: staged
  run_id: null
  control_profile: baseline_no_4h_tier1_4h_large_trade_pressure_long
  candidate_profiles:
    - baseline_no_4h_tier1_4h_large_trade_pressure_long_no_4h_volume_context
    - baseline_no_4h_tier1_4h_large_trade_pressure_long_no_1h_volume_context
    - baseline_no_4h_tier1_4h_large_trade_pressure_long_no_volume_context
    - baseline_no_4h_tier1_4h_large_trade_pressure_long_no_4h_pure_volatility
    - baseline_no_4h_tier1_4h_large_trade_pressure_long_4h_vwap_only_structure
    - baseline_no_4h_tier1_4h_large_trade_pressure_long_no_4h_bounded_flow
  triage_fold_ids: [2, 4, 8, 13, 16, 17, 20, 22, 23, 29, 35, 36, 38, 39, 40, 41]
  full_cv_profiles: auto
  always_full_profiles:
    - baseline_no_4h_tier1_4h_large_trade_pressure_long
  max_auto_full_candidates: 2
  resume_existing: true
  force_retrain: false
  promotion_gates:
    triage:
      min_mean_rank_ic_delta: 0.005
      max_std_rank_ic_delta: 0.005
      min_top_10_lift_global: 1.05
      min_top_10_positive_lift_fold_rate: 0.55
    full:
      min_mean_rank_ic_delta: 0.005
      min_positive_ic_fraction_floor: 0.75
      max_std_rank_ic_delta: 0.002
      min_selected_threshold_f1: 0.45
      min_selected_threshold_f1_delta: 0.0
      min_long_f1_delta: null
      min_top_10_lift_global_delta: 0.05
