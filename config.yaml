project:
  name: yeniBot
  package: yenibot
  phase: 1
  random_seed: 42
  deterministic: true

paths:
  drive_base: /content/drive/MyDrive/yeniBot
  data_dir: /content/drive/MyDrive/yeniBot/data
  checkpoint_dir: /content/drive/MyDrive/yeniBot/checkpoints
  local_data_dir: data
  local_checkpoint_dir: checkpoints

binance:
  base_url: https://fapi.binance.com
  vision_base_url: https://s3-ap-northeast-1.amazonaws.com/data.binance.vision
  data_source: auto
  symbol: BTCUSDT
  primary_interval: 1h
  htf_interval: 4h
  start_date: "2022-01-01"
  end_date: null
  limit: 1500
  request_sleep_seconds: 0.15
  max_gap_multiplier: 2
  zero_volume_policy: drop

features:
  active_profile: baseline_plus_4h_bounded_whale_stable_structure
  exclude_columns: []
  exclude_patterns: []
  profiles:
    all:
      description: Use every feature that survives leakage and stationarity filters.
      include_patterns: ["*"]
      exclude_patterns: []
    baseline_40:
      description: Original stationarity-safe Tier 1-3 feature set without order-flow v2.
      include_patterns:
        - "*taker_buy_ratio"
        - "*taker_sell_ratio"
        - "*true_cvd_zscore"
        - "*true_cvd_delta_norm"
        - "*cvd_cumulative_rate_norm"
        - "*buy_sell_imbalance_ema"
        - "*volume_log_zscore"
        - "*volume_denoised_log_zscore"
        - "*close_denoised_log_return"
        - "*log_return"
        - "*realized_vol_14"
        - "*gk_vol_14"
        - "*atr_14_pct"
        - "*adx_14"
        - "*vwap_dist_atr"
        - "*vpt_zscore"
        - "*vol_per_trade_log_zscore"
        - "*whale_buy_flag"
        - "*whale_sell_flag"
        - "*large_trade_ratio"
      exclude_patterns:
        - "*taker_imbalance*"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_bounded_v2:
      description: Baseline plus bounded taker-imbalance v2 features on 1H and 4H.
      inherit: baseline_40
      include_patterns:
        - "*taker_imbalance"
        - "*taker_buy_ratio_zscore"
        - "*taker_buy_ratio_delta"
        - "*taker_imbalance_slope"
        - "*taker_imbalance_mean_*"
      exclude_patterns:
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale:
      description: Conservative next run; baseline plus only 4H bounded order-flow v2 and whale context.
      inherit: baseline_40
      include_patterns:
        - "4h_taker_imbalance"
        - "4h_taker_buy_ratio_zscore"
        - "4h_taker_buy_ratio_delta"
        - "4h_taker_imbalance_slope"
        - "4h_taker_imbalance_mean_*"
        - "4h_vpt_zscore"
        - "4h_vol_per_trade_log_zscore"
        - "4h_whale_buy_flag"
        - "4h_whale_sell_flag"
        - "4h_large_trade_ratio"
      exclude_patterns:
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1:
      description: Keep the bounded 4H v2 and whale context, but remove the harmful inherited 4H Tier 1 family.
      inherit: baseline_plus_4h_bounded_whale
      include_patterns: []
      exclude_patterns:
        - "4h_taker_buy_ratio"
        - "4h_taker_sell_ratio"
        - "4h_true_cvd_zscore"
        - "4h_true_cvd_delta_norm"
        - "4h_cvd_cumulative_rate_norm"
        - "4h_buy_sell_imbalance_ema"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale_stable_structure:
      description: Long-horizon profile; use stable volatility/structure ranks/zscores instead of raw vol/structure levels.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      include_patterns:
        - "*log_return_stable_zscore"
        - "*log_return_stable_rank"
        - "*realized_vol_14_stable_zscore"
        - "*realized_vol_14_stable_rank"
        - "*gk_vol_14_stable_zscore"
        - "*gk_vol_14_stable_rank"
        - "*atr_14_pct_stable_zscore"
        - "*atr_14_pct_stable_rank"
        - "*adx_14_stable_zscore"
        - "*adx_14_stable_rank"
        - "*vwap_dist_atr_stable_zscore"
        - "*vwap_dist_atr_stable_rank"
        - "*volume_log_zscore_stable_zscore"
        - "*volume_log_zscore_stable_rank"
        - "*volume_denoised_log_zscore_stable_zscore"
        - "*volume_denoised_log_zscore_stable_rank"
      exclude_patterns:
        - "4h_taker_buy_ratio"
        - "4h_taker_sell_ratio"
        - "4h_true_cvd_zscore"
        - "4h_true_cvd_delta_norm"
        - "4h_cvd_cumulative_rate_norm"
        - "4h_buy_sell_imbalance_ema"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*log_return"
        - "*realized_vol_14"
        - "*gk_vol_14"
        - "*atr_14_pct"
        - "*adx_14"
        - "*vwap_dist_atr"
        - "*volume_log_zscore"
        - "*volume_denoised_log_zscore"
    baseline_plus_stable_v2:
      description: Baseline plus stable v2 pressure/divergence features for explicit comparison.
      inherit: baseline_40
      include_patterns:
        - "*_stable_rank"
        - "*_stable_zscore"
      exclude_patterns: []
  warmup_rows: 300
  stationarity:
    enabled: true
    normalization_window: 100
    exclude_nonstationary: true
    exclude_patterns:
      - "*close_denoised"
      - "*volume_denoised"
      - "*true_cvd_delta"
      - "*cvd_cumulative_rate"
      - "*vol_per_trade"
      - "*atr_14"
  wavelet:
    enabled: true
    window: 256
    wavelet: db4
    level: 2
    threshold_scale: 0.5
  order_flow:
    cvd_zscore_window: 100
    cvd_rate_window: 100
    imbalance_ema_span: 14
  order_flow_v2:
    enabled: true
    ratio_zscore_window: 100
    ratio_delta_periods: 1
    imbalance_slope_window: 24
    pressure_windows: [3, 6, 12, 24]
    efficiency_epsilon: 0.001
    stable_only: true
    stable_window: 100
    stable_clip_abs: 5.0
    stable_transforms: [zscore, rank]
  structure_stability:
    enabled: true
    stable_window: 100
    stable_clip_abs: 5.0
    stable_transforms: [zscore, rank]
    source_columns:
      - log_return
      - close_denoised_log_return
      - realized_vol_14
      - gk_vol_14
      - atr_14_pct
      - adx_14
      - vwap_dist_atr
      - volume_log_zscore
      - volume_denoised_log_zscore
  whale:
    vpt_zscore_window: 100
    whale_zscore_threshold: 2.0
    whale_buy_ratio: 0.55
    whale_sell_ratio: 0.45
    large_trade_window: 100
  structure:
    realized_vol_window: 14
    gk_vol_window: 14
    atr_period: 14
    adx_period: 14
    vwap_window: 24
  mtf:
    shift_hours: 4

labeling:
  tp_multiplier: 2.0
  sl_multiplier: 5.0
  max_holding_bars: 10
  atr_column: atr_14
  min_long_forward_return: 0.003
  max_not_long_forward_return: 0.001
  min_long_pct: 0.20
  max_long_pct: 0.50

model:
  seq_len: 64
  tcn_channels: 64
  tcn_kernel_size: 3
  tcn_dilations: [1, 2, 4, 8, 16]
  gru_hidden: 128
  gru_layers: 2
  dropout: 0.2
  fusion_hidden: 128

training:
  batch_size: 256
  epochs: 100
  early_stop_patience: 15
  optimizer:
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    T_0: 10
    T_mult: 2
  grad_clip: 1.0
  loss:
    focal_gamma: 2.0
    focal_alpha: 0.6
    rank_ic_weight: 0.2

walk_forward:
  train_bars: 5040
  val_bars: 1080
  test_bars: 720
  step_bars: 720
  purge_bars: 24
  embargo_bars: 6

hmm:
  n_states: 3
  covariance_type: full
  n_iter: 200
  random_state: 42
  gamma_floor: 0.02
  state_weight_floor: 0.08
  n_ratio_alarm: 15.0
  features:
    - log_return
    - gk_vol_14
    - adx_14
    - true_cvd_zscore
    - vwap_dist_atr

validation:
  target_rank_ic: 0.03
  max_rank_ic_std: 0.03
  min_positive_ic_fraction: 0.75
  min_long_f1: 0.45
  suspicious_rank_ic: 0.10
  random_like_rank_ic: 0.01
  calibration_bins: 10
  score_lift_bins: 10
  score_bands:
    - {name: top_10, min_bin: 9, max_bin: 9}
    - {name: top_20, min_bin: 8, max_bin: 9}
    - {name: top_30, min_bin: 7, max_bin: 9}
    - {name: upper_half, min_bin: 5, max_bin: 9}
    - {name: mid_upper_40_90, min_bin: 4, max_bin: 8}
  recent_folds: 5
  permutation_importance_folds: 7
  permutation_repeats: 1
